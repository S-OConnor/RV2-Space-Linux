# meta-company: product layer for the RV2 SGL starter.
# Owns: rv2-sgl distro, rv2-sgl-image, packagegroup-rv2-sgl-base, hello-rv2.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-company"
BBFILE_PATTERN_meta-company = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-company = "10"
LAYERVERSION_meta-company = "1"

# core               = openembedded-core (meta)
# yocto              = meta-poky (rv2-sgl.conf requires conf/distro/poky.conf)
# openembedded-layer = meta-oe (nano)
# networking-layer   = meta-networking (chrony)
LAYERDEPENDS_meta-company = "core yocto openembedded-layer networking-layer"

# ADJUST HERE on a Yocto series bump (keep in sync with kas/include/rv2-base.yml).
LAYERSERIES_COMPAT_meta-company = "wrynose"
